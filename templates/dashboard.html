<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Service Analytics Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">
    <h2 class="text-center text-success">📊 Service Time Dashboard</h2>
    <p class="text-center text-muted">Track average times and prediction trends</p>
    <hr>

    <div class="text-center">
        <h4>Average Predicted Time: <strong>{{ avg_time }}</strong> hours</h4>
        <h5>Total Predictions: <strong>{{ total_preds }}</strong></h5>
    </div>

    <div class="mt-4 text-center">
        <img src="{{ image_path }}" class="img-fluid rounded shadow">
    </div>

    <div class="text-center mt-4">
        <a href="/" class="btn btn-primary">🔙 Back to Home</a>
    </div>
</div>
</body>
</html>
