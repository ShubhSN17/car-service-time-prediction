<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Car Service Time Prediction</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
  <div class="card">
    <h2 class="heading">🚗 Car Service Time Prediction</h2>
    <div class="text-center mb-3">
      <a href="/dashboard" class="btn btn-light btn-sm">📊 Dashboard</a>
    </div>

    <form action="/predict" method="POST">
      <div class="row g-3">
        <div class="col-md-6">
          <label>Car Name / Model</label>
          <select class="form-select" name="car_name" required>
            <option value="">Select Car</option>
            <option>Maruti Swift</option>
            <option>Maruti Baleno</option>
            <option>Maruti Alto</option>
            <option>Hyundai i10</option>
            <option>Hyundai i20</option>
            <option>Hyundai Creta</option>
            <option>Hyundai Verna</option>
            <option>Tata Nexon</option>
            <option>Tata Harrier</option>
            <option>Tata Punch</option>
            <option>Mahindra Scorpio</option>
            <option>Mahindra XUV700</option>
            <option>Mahindra Thar</option>
            <option>Honda City</option>
            <option>Honda Amaze</option>
            <option>Toyota Innova</option>
            <option>Toyota Fortuner</option>
            <option>Toyota Glanza</option>
            <option>Kia Seltos</option>
            <option>Kia Sonet</option>
            <option>Renault Kwid</option>
            <option>Renault Triber</option>
            <option>Nissan Magnite</option>
            <option>Skoda Slavia</option>
            <option>Skoda Kushaq</option>
            <option>Volkswagen Virtus</option>
            <option>Volkswagen Taigun</option>
            <option>Ford EcoSport</option>
            <option>Ford Figo</option>
            <option>MG Hector</option>
            <option>MG Astor</option>
            <option>Jeep Compass</option>
            <option>Jeep Meridian</option>
            <option>Citroen C3</option>
            <option>Hyundai Venue</option>
            <option>Tata Tiago</option>
            <option>Tata Tigor</option>
            <option>Maruti Ciaz</option>
          </select>
        </div>

        <div class="col-md-6">
          <label>Service Type</label>
          <select class="form-select" name="service_type" required>
            <option>Basic</option>
            <option>Full</option>
            <option>Engine Repair</option>
            <option>Transmission</option>
            <option>Electrical</option>
            <option>Painting</option>
          </select>
        </div>

        <div class="col-md-6">
          <label>Engine Type</label>
          <select class="form-select" name="engine_type" required>
            <option>Petrol</option>
            <option>Diesel</option>
            <option>Hybrid</option>
            <option>Electric</option>
          </select>
        </div>

        <div class="col-md-6">
          <label>Condition of Vehicle</label>
          <select class="form-select" name="condition_of_vehicle" required>
            <option>Good</option>
            <option>Average</option>
            <option>Poor</option>
          </select>
        </div>

        <div class="col-md-6">
          <label>Availability of Spare Parts</label>
          <select class="form-select" name="availability_of_spare_parts" required>
            <option>Available</option>
            <option>Limited</option>
            <option>Not Available</option>
          </select>
        </div>

        <div class="col-md-6">
          <label>Turbocharged</label>
          <select class="form-select" name="turbo">
            <option value="0">No</option>
            <option value="1">Yes</option>
          </select>
        </div>

        <div class="col-md-6">
          <label>Check Engine Light</label>
          <select class="form-select" name="check_engine_light">
            <option value="0">Off</option>
            <option value="1">On</option>
          </select>
        </div>

        <div class="col-md-6">
          <label>Car Age (years)</label>
          <input type="number" name="car_age" step="0.1" min="0" class="form-control" required>
        </div>

        <div class="col-md-6">
          <label>Mileage (km)</label>
          <input type="number" name="mileage" step="100" min="0" class="form-control" required>
        </div>

        <div class="col-md-6">
          <label>Parts to Replace (count)</label>
          <input type="number" name="parts_to_replace" step="1" min="0" class="form-control" required>
        </div>

        <div class="col-md-6">
          <label>Workload Queue (cars ahead)</label>
          <input type="number" name="workload_queue" step="1" min="0" class="form-control" required>
        </div>

        <div class="col-md-6">
          <label>Mechanic Experience (years)</label>
          <input type="number" name="mechanic_experience_years" step="0.5" min="0" class="form-control" required>
        </div>

        <div class="col-md-6">
          <label>Engine Capacity (cc)</label>
          <input type="number" name="engine_capacity" step="50" min="500" class="form-control" required>
        </div>

        <div class="col-md-6">
          <label>Number of Cylinders</label>
          <input type="number" name="num_cylinders" step="1" min="1" max="16" class="form-control" required>
        </div>

        <div class="col-md-6">
          <label>Battery (kWh)</label>
          <input type="number" name="battery_kwh" step="0.1" min="0" class="form-control" required>
        </div>

        <div class="col-md-6">
          <label>Oil Quality Score (0-10)</label>
          <input type="number" name="oil_quality" step="0.1" min="0" max="10" class="form-control" required>
        </div>

        <div class="col-md-6">
          <label>Average Engine Temp (°C)</label>
          <input type="number" name="avg_engine_temp_c" step="0.1" min="60" max="130" class="form-control" required>
        </div>

        <div class="col-md-6">
          <label>Months Since Last Service</label>
          <input type="number" name="last_service_months_ago" step="1" min="0" class="form-control" required>
        </div>

        <div class="col-md-6">
          <label>Engine Wear Score (0-10)</label>
          <input type="number" name="engine_wear_score" step="0.1" min="0" max="10" class="form-control" required>
        </div>
      </div>

      <div class="text-center mt-4">
        <button type="submit" class="btn btn-primary btn-lg">Predict Service Time</button>
      </div>
    </form>

    {% if prediction_text %}
    <div class="result-box">
      <p>{{ prediction_text }}</p>
    </div>
    {% endif %}
  </div>
</body>
</html>
