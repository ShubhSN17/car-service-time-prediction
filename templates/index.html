<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Service Time Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(120deg, #2c3e50, #4ca1af);
            color: #fff;
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px 40px;
            margin-top: 40px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
        .form-label {
            font-weight: 500;
        }
        .btn-primary {
            background-color: #4ca1af;
            border: none;
            font-weight: 600;
        }
        .btn-primary:hover {
            background-color: #2c3e50;
        }
        .result-box {
            margin-top: 25px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 15px;
            font-size: 1.2rem;
        }
        .heading {
            text-align: center;
            margin-bottom: 25px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2 class="heading">🚗 Car Service Time Prediction</h2>

        <div class="text-center mb-4">
            <a href="/dashboard" class="btn btn-light btn-sm text-dark fw-bold">📊 Go to Dashboard</a>
        </div>
        <form action="/predict" method="POST">

            <!-- Car Information -->
            <h5>Car Details</h5>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Car Name / Model</label>
                    <select class="form-select" name="car_name" required>
                        <option value="">Select Car</option>
                        <option>Maruti Swift</option>
                        <option>Hyundai i20</option>
                        <option>Tata Nexon</option>
                        <option>Honda City</option>
                        <option>Mahindra Scorpio</option>
                        <option>Toyota Innova</option>
                        <option>Hyundai Creta</option>
                        <option>Kia Seltos</option>
                        <option>Maruti Baleno</option>
                        <option>Skoda Slavia</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Engine Type</label>
                    <select class="form-select" name="engine_type" required>
                        <option value="">Select Type</option>
                        <option>Petrol</option>
                        <option>Diesel</option>
                        <option>Hybrid</option>
                        <option>Electric</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Service Type</label>
                    <select class="form-select" name="service_type" required>
                        <option value="">Select Type</option>
                        <option>Basic</option>
                        <option>Standard</option>
                        <option>Major</option>
                        <option>Emergency</option>
                        <option>Full Inspection</option>
                        <option>Oil Change</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Turbocharged?</label>
                    <select class="form-select" name="turbo" required>
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>
            </div>

            <!-- Vehicle Condition -->
            <h5>Vehicle Condition</h5>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Condition of Vehicle</label>
                    <select class="form-select" name="condition_of_vehicle" required>
                        <option>Good</option>
                        <option>Average</option>
                        <option>Poor</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Availability of Spare Parts</label>
                    <select class="form-select" name="availability_of_spare_parts" required>
                        <option>Available</option>
                        <option>Limited</option>
                        <option>Not Available</option>
                    </select>
                </div>
            </div>

            <!-- Numeric Inputs -->
            <h5>Workshop & Performance Details</h5>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Car Age (years)</label>
                    <input type="number" name="car_age" step="0.1" min="0" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Mileage (km)</label>
                    <input type="number" name="mileage" step="100" min="0" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Parts to Replace (count)</label>
                    <input type="number" name="parts_to_replace" step="1" min="0" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Workload Queue (cars ahead)</label>
                    <input type="number" name="workload_queue" step="1" min="0" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Mechanic Experience (years)</label>
                    <input type="number" name="mechanic_experience_years" step="0.5" min="0" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Engine Capacity (cc)</label>
                    <input type="number" name="engine_capacity" step="50" min="0" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Number of Cylinders</label>
                    <input type="number" name="num_cylinders" step="1" min="1" max="16" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Battery (kWh)</label>
                    <input type="number" name="battery_kwh" step="0.1" min="0" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Oil Quality Score (0-10)</label>
                    <input type="number" name="oil_quality" step="0.1" min="0" max="10" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Check Engine Light</label>
                    <select class="form-select" name="check_engine_light" required>
                        <option value="0">Off</option>
                        <option value="1">On</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Average Engine Temp (°C)</label>
                    <input type="number" name="avg_engine_temp_c" step="0.1" min="60" max="130" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Months Since Last Service</label>
                    <input type="number" name="last_service_months_ago" step="1" min="0" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Engine Wear Score (0-10)</label>
                    <input type="number" name="engine_wear_score" step="0.1" min="0" max="10" class="form-control" required>
                </div>
            </div>

            <!-- Submit -->
            <div class="text-center mt-4">
                <button type="submit" class="btn btn-primary btn-lg">Predict Service Time</button>
            </div>

        </form>

        {% if prediction_text %}
        <div class="result-box mt-4 text-center">
            <h4>{{ prediction_text }}</h4>
        </div>
        {% endif %}
    </div>
</body>
</html>
